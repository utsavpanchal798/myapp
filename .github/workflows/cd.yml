name: CD Pipeline - Deploy to EC2

on:
  workflow_run:
    workflows: ["CI Pipeline - Build & Test"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST_DNS }}
        username: ec2-user   # Jo Ubuntu OS hoy to 'ubuntu' lakho
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Automatically install Docker if not installed
          if ! command -v docker &> /dev/null; then
              echo "Docker not found, installing..."
              sudo yum update -y || sudo apt update -y
              sudo yum install docker -y || sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
          fi

          # Run application container
          sudo docker stop myapp-container || true
          sudo docker rm myapp-container || true
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          sudo docker run -d -p 80:80 --name myapp-container ${{ secrets.DOCKER_USERNAME }}/myapp:latest
