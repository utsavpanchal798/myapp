name: CD Pipeline - Deploy to EC2

on:
  workflow_run:
    workflows: ["CI Pipeline - Build & Test"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST_DNS }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Automatic Docker Install (If not present)
          if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              if command -v yum &> /dev/null; then
                  sudo yum update -y
                  sudo yum install docker -y
              else
                  sudo apt-get update -y
                  sudo apt-get install docker.io -y
              fi
              sudo systemctl start docker
              sudo systemctl enable docker
          fi

          # 2. Run Application
          sudo docker stop myapp-container || true
          sudo docker rm myapp-container || true
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          sudo docker run -d -p 80:80 --name myapp-container ${{ secrets.DOCKER_USERNAME }}/myapp:latest
